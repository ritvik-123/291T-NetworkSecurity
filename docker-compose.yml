version: "3.8"



services:

  router:

    image: handsonsecurity/seed-ubuntu:large

    container_name: router

    privileged: true

    cap_add:

      - ALL

    networks:

      net-10.9.0.0:

        ipv4_address: 10.9.0.11

      net-192.168.60.0:

        ipv4_address: 192.168.60.11

      net-10.10.0.0:

        ipv4_address: 10.10.0.11

    command: >

      bash -c "

      sysctl -w net.ipv4.ip_forward=1 &&

      tail -f /dev/null

      "



  host-10.9.0.5:

    image: handsonsecurity/seed-ubuntu:large

    container_name: host-10.9.0.5

    privileged: true

    cap_add:

      - ALL

    networks:

      net-10.9.0.0:

        ipv4_address: 10.9.0.5

    command: >

      bash -c "

      ip route replace default via 10.9.0.11 &&

      tail -f /dev/null

      "



  host-10.9.0.6:

    image: handsonsecurity/seed-ubuntu:large

    container_name: host-10.9.0.6

    privileged: true

    cap_add:

      - ALL

    networks:

      net-10.9.0.0:

        ipv4_address: 10.9.0.6

    command: >

      bash -c "

      ip route replace default via 10.9.0.11 &&

      tail -f /dev/null

      "



  host-192.168.60.5:

    image: handsonsecurity/seed-ubuntu:large

    container_name: host-192.168.60.5

    privileged: true

    cap_add:

      - ALL

    networks:

      net-192.168.60.0:

        ipv4_address: 192.168.60.5

    command: >

      bash -c "

      ip route replace default via 192.168.60.11 &&

      tail -f /dev/null

      "



  host-192.168.60.6:

    image: handsonsecurity/seed-ubuntu:large

    container_name: host-192.168.60.6

    privileged: true

    cap_add:

      - ALL

    networks:

      net-192.168.60.0:

        ipv4_address: 192.168.60.6

    command: >

      bash -c "

      ip route replace default via 192.168.60.11 &&

      tail -f /dev/null

      "



  host-10.10.0.5:

    image: handsonsecurity/seed-ubuntu:large

    container_name: host-10.10.0.5

    privileged: true

    cap_add:

      - ALL

    networks:

      net-10.10.0.0:

        ipv4_address: 10.10.0.5

    command: >

      bash -c "

      ip route replace default via 10.10.0.11 &&

      tail -f /dev/null

      "



  host-10.10.0.6:

    image: handsonsecurity/seed-ubuntu:large

    container_name: host-10.10.0.6

    privileged: true

    cap_add:

      - ALL

    networks:

      net-10.10.0.0:

        ipv4_address: 10.10.0.6

    command: >

      bash -c "

      ip route replace default via 10.10.0.11 &&

      tail -f /dev/null

      "



networks:

  net-10.9.0.0:

    ipam:

      config:

        - subnet: 10.9.0.0/24



  net-192.168.60.0:

    ipam:

      config:

        - subnet: 192.168.60.0/24



  net-10.10.0.0:

    ipam:

      config:

        - subnet: 10.10.0.0/24